name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Create .env for build
        run: |
          cat > .env << 'EOF'
          VITE_SUPABASE_PROJECT_ID="fagtxhenqbzcnqwtjtlt"
          VITE_SUPABASE_PUBLISHABLE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhZ3R4aGVucWJ6Y25xd3RqdGx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NTY3MDksImV4cCI6MjA5MzMzMjcwOX0.rBHNBNJqrnGALRpd7GxlXab7QY5r-aalNE1nOi9owV8"
          VITE_SUPABASE_URL="https://fagtxhenqbzcnqwtjtlt.supabase.co"
          EOF

      - name: Build
        run: bun run build


      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
