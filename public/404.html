    <script type="text/javascript">
      // GitHub Pages SPA redirect: preserve the requested path and forward to index.html
      (function () {
        var base = "/dividend-compass/";
        var l = window.location;
        if (l.pathname.indexOf(base) === 0) {
          var path = l.pathname.slice(base.length);
          l.replace(
            l.protocol + "//" + l.host + base + "?/" +
            path.replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
          );
        }
      })();
    </script>
